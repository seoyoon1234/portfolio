<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seoyoon Portfolio</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="border.css">
</head>

<body>

<canvas id="canvas"></canvas>

<nav>
<h2>SY</h2>
<ul>
<li><a href="#hero">Home</a></li>
<li><a href="#about">About</a></li>
<li><a href="#skills">Skills</a></li>
<li><a href="#board">board</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<section id="hero" class="section hero">
<h1><span class="gradient">seoyoon's portfolio</span></h1>
<h2 id="typing"></h2>
</section>

<section id="about" class="section reveal page2">
<h2>About</h2>
<p>웹 개발과 정보보안을 공부하고 있는 정서윤입니다.</p>
</section>

<section id="skills" class="section reveal page3">
<h2>Skills</h2>

<div class="skills">
<div class="skill">HTML</div>
<div class="skill">CSS</div>
<div class="skill">JavaScript</div>
<div class="skill">Node.js</div>
</div>

</section>

<section id="board" class="section reveal page4">
  
<h2 class="gradient  board-title">Board</h2>
  <div class="board-container">

    <!-- 작성 -->
    <div class="board-write">
      <input type="text" id="title" placeholder="제목">
      <textarea id="content" placeholder="내용"></textarea>
      <button onclick="addPost()">작성</button>
    </div>

    <!-- 게시글 -->
    <div id="postList"></div>

    <!-- 페이지 -->
    <div class="pagination">
      <button onclick="prevPage()">이전</button>
      <span id="pageInfo"></span>
      <button onclick="nextPage()">다음</button>
    </div>

  </div>
</section>

<!-- 모달 -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h3 id="modalTitle"></h3>
    <p id="modalContent"></p>
  </div>
</div>



<section id="contact" class="section reveal page5">
<h2>Contact</h2>
<p>Email : jeongseoyoon@email.com</p>
</section>

<script src="particles.js"></script>
<script src="script.js"></script>
<script src="border.js"></script>

</body>
</html>
