<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seoyoon Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="canvas"></canvas>

<nav>
  <h2>SY</h2>
  <ul>
    <li><a href="#hero">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#board">Board</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section id="hero" class="section hero">
  <h1><span class="gradient">seoyoon's portfolio</span></h1>
  <h2 id="typing"></h2>
</section>

<section id="about" class="section reveal page2">
  <h2>About</h2>
  <p>웹 개발과 정보보안을 공부하고 있는 정서윤입니다.</p>
</section>

<section id="skills" class="section reveal page3">
  <h2>Skills</h2>
  <div class="skills">
    <div class="skill">HTML</div>
    <div class="skill">CSS</div>
    <div class="skill">JavaScript</div>
    <div class="skill">Node.js</div>
  </div>
</section>

<section id="board" class="section reveal page4">
  <div class="board-title">board</div>

  <div class="board-write">
    <input type="text" id="postTitle" placeholder="제목을 입력하세요">
    <textarea id="postContent" rows="3" placeholder="내용을 입력하세요"></textarea>
    <button onclick="createPost()"> 작성하기</button>
  </div>

  <div class="board-container" style="margin: 0 auto;">
    <div id="postList"></div>
    <div class="pagination">
      <button>&lt; 이전</button>
      <button>다음 &gt;</button>
    </div>
  </div>
</section>

<div class="modal" id="postModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    
    <div id="viewMode">
      <h3 id="modalTitle"></h3>
      <p id="modalContent" class="modal-detail-content"></p>
      <div class="modal-actions">
        <button onclick="openEditMode()" class="edit-btn"> 수정하기</button>
      </div>
    </div>

    <div id="editMode" style="display: none;">
      <h3>게시글 수정</h3>
      <input type="hidden" id="editPostId">
      <input type="text" id="editPostTitle" class="modal-input" placeholder="제목 수정">
      <textarea id="editPostContent" class="modal-textarea" rows="4" placeholder="내용 수정"></textarea>
      <div class="modal-actions">
        <button onclick="saveEditPost()" class="save-btn"> 저장하기</button>
        <button onclick="cancelEditMode()" class="cancel-btn">취소</button>
      </div>
    </div>

  </div>
</div>

<section id="contact" class="section reveal page5">
  <h2>Contact</h2>
  <p>Email : jeongseoyoon@email.com</p>
</section>

<script src="particles.js"></script>
<script src="script.js"></script>
</body>
</html>
